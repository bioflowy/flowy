      - errorMsg
      - id
      type: object
    _api_do_eval_post_request:
      properties:
        id:
          type: string
        ex:
          type: string
        exitCode:
          type: integer
        context:
          nullable: true
      required:
      - ex
      - id
      type: object
    CommandString_inner:
      properties:
        type:
          enum:
          - Key
          - Literal
          type: string
        value:
          type: string
      required:
      - type
      - value
      type: object
    OutputBinding_secondaryFiles_inner:
      example:
        pattern: pattern
        requiredBoolean: true
        requiredString: requiredString
      properties:
        pattern:
          type: string
        requiredBoolean:
